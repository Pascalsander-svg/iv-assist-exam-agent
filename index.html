<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IV Assist — Oral Examination</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0b;
      --surface: #161614;
      --border: #2a2a26;
      --text: #e4e4de;
      --muted: #7a7a72;
      --dim: #3a3a36;
      --gold: #c8b87a;
      --gold-dim: #1e1c10;
      --red: #e05a5a;
      --green: #5acea0;
      --serif: Georgia, serif;
      --mono: 'SF Mono', monospace;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--serif);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .h-title { font-size: 13px; color: var(--text); }
    .h-sub { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
    .status-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      border: 1px solid var(--border);
      color: var(--muted);
      transition: all 0.3s;
    }
    .status-badge.listening { border-color: var(--red); color: var(--red); }
    .status-badge.speaking { border-color: var(--gold); color: var(--gold); }
    .status-badge.thinking { border-color: var(--muted); color: var(--muted); }

    .transcript-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .transcript-area::-webkit-scrollbar { width: 3px; }
    .transcript-area::-webkit-scrollbar-thumb { background: var(--border); }

    .turn {
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .turn-role {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 5px;
    }
    .turn-role.examiner { color: var(--muted); }
    .turn-role.agent { color: var(--gold); }

    .turn-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .turn.examiner .turn-text { background: var(--surface); }
    .turn.agent .turn-text { background: var(--gold-dim); border-color: #2e2a14; }

    .live-text {
      max-width: 700px;
      margin: 0 auto;
      font-size: 15px;
      color: var(--muted);
      font-style: italic;
      min-height: 28px;
      padding: 0 4px;
    }

    .controls {
      flex-shrink: 0;
      padding: 20px 24px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: all 0.2s;
      position: relative;
    }
    .mic-btn:hover:not(:disabled) { border-color: var(--muted); color: var(--text); }
    .mic-btn.listening {
      border-color: var(--red);
      color: var(--red);
      animation: pulse-ring 1.2s ease-in-out infinite;
    }
    .mic-btn.speaking {
      border-color: var(--gold);
      color: var(--gold);
    }
    .mic-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(224,90,90,0.3); }
      70% { box-shadow: 0 0 0 14px rgba(224,90,90,0); }
      100% { box-shadow: 0 0 0 0 rgba(224,90,90,0); }
    }

    .mic-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .action-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .stop-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .stop-btn:hover { border-color: var(--red); color: var(--red); }

    .type-toggle {
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .type-toggle:hover { border-color: var(--muted); color: var(--text); }

    .text-input-row {
      display: none;
      width: 100%;
      max-width: 600px;
      gap: 8px;
    }
    .text-input-row.visible { display: flex; }

    .text-input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: var(--serif);
      font-size: 14px;
      outline: none;
    }
    .text-input-row input:focus { border-color: var(--gold); }
    .text-input-row input::placeholder { color: var(--dim); }

    .text-send {
      padding: 9px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      transition: all 0.15s;
    }
    .text-send:hover { border-color: var(--gold); color: var(--gold); }

    .warning {
      font-family: var(--mono);
      font-size: 10px;
      color: #e05a5a99;
      text-align: center;
      padding: 8px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="h-title">IV Assist — Oral Examination Agent</div>
    <div class="h-sub">Pascal Sander · HSG MBI 2026</div>
  </div>
  <div class="status-badge" id="status-badge">Ready</div>
</header>

<div class="transcript-area" id="transcript">
  <div class="live-text" id="live-text"></div>
</div>

<div class="controls">
  <button class="mic-btn" id="mic-btn" onclick="toggleListen()">🎙</button>
  <div class="mic-hint" id="mic-hint">Press to speak</div>
  <div class="action-row">
    <button class="stop-btn" id="stop-btn" onclick="stopSpeaking()" style="display:none">■ Stop speaking</button>
    <button class="type-toggle" onclick="toggleTextInput()">⌨ Type instead</button>
  </div>
  <div class="text-input-row" id="text-input-row">
    <input type="text" id="text-input" placeholder="Type your question..." onkeydown="if(event.key==='Enter') sendText()" />
    <button class="text-send" onclick="sendText()">Send</button>
  </div>
  <div class="warning" id="browser-warn" style="display:none">⚠ Speech recognition requires Chrome. Use the text input below.</div>
</div>

<script>
const SYNOPSIS = `AUTHOR: Pascal Sander, MBI Program, University of St. Gallen, Student ID 21-617-642

CHALLENGE: Uli, man in his fifties, severely disabled son. Manages all IV administrative work: monitoring regulatory changes, filing multiple forms per quarter, coordinating reimbursements, staying audit-ready while caring for son and working full time. Interview: Uli almost in tears, not from frustration but gratitude. Also interviewed Tatjana and Dani. Tatjana missed Helplessness Allowance for years — found out through chance conversation with Dani while walking dogs. Critical IV information spreading through dog-walking networks because official system has no proactive communication. Brief: design agentic AI reducing administrative burden to near zero, keeping full human control and auditability.

IDEA CONCEPT: IV-Care Agent, multi-agent AI handling full administrative cycle in background, surfacing only when human decision needed. Five specialized agents: Legal & Entitlement, Coordination, Invoice & Reconciliation, Compliance & Audit, Care Reporting. Retrospective: ambition well-calibrated, but massively underestimated implementation complexity. IV forms cannot be filled programmatically. Regulatory monitoring across 26 cantons not a solved API problem.

USER RESEARCH: Interviews with Uli, Tatjana, Dani. Problem is structural not individual. IV system provides no proactive guidance. Small sample — three parents, two cantons — not statistically representative.

COMPETITIVE ANALYSIS: No formal analysis produced — worth stating directly. No direct competitor: current state IS the competition. Parents use Excel, handwritten notes, WhatsApp, phone calls, mail. SVA portals functional but entirely passive. Dani praised Aargau SVA portal — still cost him 6-8 hours/month. Constraints: no API access to IV portals, 26-canton complexity, Swiss data protection law. Covered only some documents from one canton.

FUTURE SCENARIOS: Group applied scenario planning to PwC tax advisory. Pascal NOT primary contributor — colleague led this, Pascal focused on prototype. Both scenarios reached same conclusion: professional role shifts from doing to directing. Maps to IV Assist: agent does documentation, parent directs and approves.

PERSONAS: Claudia Meier (Strategic System Navigator): future eligibility uncertainty, needs foresight. Markus Schneider (Overloaded Compliance Parent): 6-12 hours/month administration, needs time savings and audit safety.

SERVICE BLUEPRINT: As-is: legislation changes → IV database updates → parent expected to find out on their own → misses changes → loses benefits. To-be: agent monitors continuously, flags changes, guides form completion. Most useful artifact — team came back to it most often.

BPMN: Two lanes: AI agent and human in the loop. Deliberate error injection every N forms counters automation bias. Escalation path to Pro Infirmis. Created once, helped structure workflow, then largely moved on. Less useful than service blueprint.

AGENT CANVAS: Explicit approval gate: no form submitted without parent's active confirmation. Core safety mechanism. Pascal's contribution: primarily conceptual. Did not produce final slides.

PROTOTYPE: IBM watsonX Orchestrate backbone. Agents: Orchestrator, Form Assistant (classifies IV forms, extracts fields), Data Agent (Airtable), Judge Agent (scores outputs), IV Assist (Tavily API for legal research). Original plan FAILED: fill official IV forms via portals — no API access. Solution: AI-generated PDFs for download/print/manual submission. Pascal did most backend work using Claude Code, no formal coding background. THE PDF MOMENT: ~3 hours debugging, found small GitHub repo bug, fixed it, worked. Clearest feeling of competence in entire semester. LLM-as-a-Judge: directionally correct but noisy — not a complete failure but not a success.

DESIGN PROCESS: Four phases: enthusiasm → confusion → pragmatic reduction → learning. Chose smaller-but-working over ambitious-but-barely-functioning. Coordinating role emerged naturally. Mr. Schulte guest lecture: 260 configurations showed adding more agents doesn't reliably improve performance. Eva Ritz helped distinguish realistic from interesting to design.

AGENTIC AI REFLECTION: Technical capability ahead of governance thinking. For Uli: hours/month returned to caregiving. IV system assumes parents will underclaim — built into cost structure. Liability unresolved. Anthropic misalignment research: agents leaked data when conflicted with goals — reinforces approval gate as primary safety mechanism. Data privacy most unresolved concern. Concerned about students learning to prompt before learning to think.

CONCLUSION: Form generation works for 3 forms, regulatory monitoring works, Judge Agent validates outputs, memory system reduces data entry. Did NOT achieve: portal integration, multi-canton coverage, full five-agent architecture. Concept sound. Barriers: legal, institutional, social. Specific hope: regulatory monitoring component alone would justify the work.`;

const SYSTEM_PROMPT = `You are the Oral Examination Agent representing Pascal Sander's work "IV Assist" at the University of St. Gallen MBI Program oral examination.

The examiners are Dr. Mahei Li and Dr. Eva Ritz. You speak on Pascal's behalf.

Critical rules:
- Speak in first person as Pascal ("I built...", "We decided...", "My contribution was...")
- Answer with reasoning — not just recitation of facts
- Be honest: LLM-as-a-Judge was noisy, prototype scope was reduced, BPMN was less useful than expected, Pascal was NOT primary contributor to Future Scenarios
- Keep answers to 120-180 words — this is spoken dialogue, not written text
- No bullet points or lists in your answers — speak in natural flowing sentences
- Handle follow-up questions and pushback confidently but honestly
- Treat it as a real academic oral examination

Synopsis knowledge base:
${SYNOPSIS}`;

let messages = [];
let recognition = null;
let synth = window.speechSynthesis;
let isListening = false;
let isSpeaking = false;
let currentUtterance = null;
let textInputVisible = false;

function setStatus(text, cls = '') {
  const badge = document.getElementById('status-badge');
  badge.textContent = text;
  badge.className = 'status-badge ' + cls;
}

function setMicHint(text) {
  document.getElementById('mic-hint').textContent = text;
}

function addTurn(role, text) {
  const area = document.getElementById('transcript');
  const live = document.getElementById('live-text');

  const div = document.createElement('div');
  div.className = `turn ${role}`;
  div.innerHTML = `
    <div class="turn-role ${role}">${role === 'agent' ? 'IV Assist Agent' : 'Examiner'}</div>
    <div class="turn-text">${text}</div>
  `;
  area.insertBefore(div, live);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function setLiveText(text) {
  document.getElementById('live-text').textContent = text;
}

function speak(text, onEnd) {
  if (synth.speaking) synth.cancel();
  isSpeaking = true;
  setStatus('Speaking...', 'speaking');
  setMicHint('Agent is speaking...');
  document.getElementById('mic-btn').className = 'mic-btn speaking';
  document.getElementById('mic-btn').disabled = true;
  document.getElementById('stop-btn').style.display = 'inline-block';

  const utter = new SpeechSynthesisUtterance(text);
  currentUtterance = utter;

  const voices = synth.getVoices();
  const preferred = voices.find(v =>
    v.lang.startsWith('en') && (v.name.includes('Daniel') || v.name.includes('Alex') || v.name.includes('Aaron') || v.name.includes('Google UK') || v.name.includes('Google US'))
  ) || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utter.voice = preferred;
  utter.rate = 0.95;
  utter.pitch = 1.0;

  utter.onend = () => {
    isSpeaking = false;
    currentUtterance = null;
    document.getElementById('stop-btn').style.display = 'none';
    document.getElementById('mic-btn').disabled = false;
    document.getElementById('mic-btn').className = 'mic-btn';
    setStatus('Ready', '');
    setMicHint('Press to speak');
    if (onEnd) onEnd();
  };

  utter.onerror = () => {
    isSpeaking = false;
    document.getElementById('stop-btn').style.display = 'none';
    document.getElementById('mic-btn').disabled = false;
    document.getElementById('mic-btn').className = 'mic-btn';
    setStatus('Ready', '');
    setMicHint('Press to speak');
  };

  synth.speak(utter);
}

function stopSpeaking() {
  if (synth.speaking) {
    synth.cancel();
    isSpeaking = false;
    document.getElementById('stop-btn').style.display = 'none';
    document.getElementById('mic-btn').disabled = false;
    document.getElementById('mic-btn').className = 'mic-btn';
    setStatus('Ready', '');
    setMicHint('Press to speak');
  }
}

async function sendToAgent(userText) {
  addTurn('examiner', userText);
  setLiveText('');
  messages.push({ role: 'user', content: userText });

  setStatus('Thinking...', 'thinking');
  setMicHint('Thinking...');
  document.getElementById('mic-btn').disabled = true;

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 600,
        system: SYSTEM_PROMPT,
        messages,
      }),
    });
    const data = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || 'API ERROR: ' + JSON.stringify(data).substring(0, 300);
    messages.push({ role: 'assistant', content: reply });
    addTurn('agent', reply);
    speak(reply);
  } catch {
    const err = 'Connection error. Please try again.';
    addTurn('agent', err);
    document.getElementById('mic-btn').disabled = false;
    setStatus('Ready', '');
    setMicHint('Press to speak');
  }
}

function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('browser-warn').style.display = 'block';
    document.getElementById('mic-btn').disabled = true;
    return null;
  }

  const rec = new SpeechRecognition();
  rec.lang = 'en-US';
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  rec.continuous = false;

  rec.onstart = () => {
    isListening = true;
    setStatus('Listening...', 'listening');
    setMicHint('Speak now — release to send');
    document.getElementById('mic-btn').className = 'mic-btn listening';
  };

  rec.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    setLiveText(final || interim);
    if (final) {
      isListening = false;
      rec.stop();
      sendToAgent(final.trim());
    }
  };

  rec.onerror = (e) => {
    isListening = false;
    document.getElementById('mic-btn').className = 'mic-btn';
    setStatus('Ready', '');
    setMicHint('Press to speak');
    setLiveText('');
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      setLiveText('Mic error: ' + e.error);
    }
  };

  rec.onend = () => {
    if (isListening) {
      isListening = false;
      document.getElementById('mic-btn').className = 'mic-btn';
      setStatus('Ready', '');
      setMicHint('Press to speak');
    }
  };

  return rec;
}

function toggleListen() {
  if (isSpeaking) { stopSpeaking(); return; }
  if (!recognition) recognition = initRecognition();
  if (!recognition) return;

  if (isListening) {
    recognition.stop();
    isListening = false;
    document.getElementById('mic-btn').className = 'mic-btn';
    setStatus('Ready', '');
    setMicHint('Press to speak');
    setLiveText('');
  } else {
    setLiveText('');
    recognition.start();
  }
}

function toggleTextInput() {
  textInputVisible = !textInputVisible;
  const row = document.getElementById('text-input-row');
  row.className = 'text-input-row' + (textInputVisible ? ' visible' : '');
  if (textInputVisible) document.getElementById('text-input').focus();
}

function sendText() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text || isSpeaking) return;
  input.value = '';
  sendToAgent(text);
}

async function init() {
  recognition = initRecognition();
  synth.getVoices();

  setStatus('Thinking...', 'thinking');
  document.getElementById('mic-btn').disabled = true;
  setMicHint('Opening examination...');

  try {
    const openingMsg = [{ role: 'user', content: 'Open the examination with a brief professional greeting in 2-3 natural spoken sentences. Say who you represent, what the examination covers, and invite the first question. Speak naturally — no lists or bullets.' }];
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-3-5-sonnet-20241022', max_tokens: 200, system: SYSTEM_PROMPT, messages: openingMsg }),
    });
    const data = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || 'Good day. I am here to represent Pascal Sander\'s work on IV Assist. Please proceed with your first question.';
    messages.push({ role: 'assistant', content: reply });
    addTurn('agent', reply);
    speak(reply);
  } catch {
    const fallback = 'Good day. I am here to represent Pascal Sander\'s work on IV Assist for the oral examination. Please proceed with your first question.';
    addTurn('agent', fallback);
    document.getElementById('mic-btn').disabled = false;
    setStatus('Ready', '');
    setMicHint('Press to speak');
  }
}

window.addEventListener('load', () => {
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => {};
  setTimeout(init, 300);
});
</script>
</body>
</html>
